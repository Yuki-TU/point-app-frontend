services:
  node:
    working_dir: /app
    image: node:20-alpine
    volumes:
      - ./:/app
    tty: true
    ports:
      - "3000:3000"
      - "4173:4173"
    command: yarn dev
  api:
    image: stoplight/prism:latest
    container_name: "api"
    platform: linux/amd64
    ports:
      - "3001:4010"
    command: mock --host 0.0.0.0 --multiprocess false https://Yuki-TU.github.io/point-app-backend/openapi.yml
